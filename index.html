<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app__header">
      <h1>To-Do List <span class="app__badge">Pro</span></h1>
      <p class="app__subtitle">Organize tasks by category, priority, and due date.</p>
    </header>

    <form id="todo-form" class="todo-form">
      <input
        type="text"
        id="todo-input"
        class="todo-form__input"
        placeholder="What do you need to do?"
        autocomplete="off"
        required
      />

      <div class="todo-form__row">
        <select id="todo-category" class="todo-form__select">
          <option value="general">General</option>
          <option value="work">Work</option>
          <option value="study">Study</option>
          <option value="personal">Personal</option>
        </select>

        <select id="todo-priority" class="todo-form__select">
          <option value="low">Low Priority</option>
          <option value="medium" selected>Medium Priority</option>
          <option value="high">High Priority</option>
        </select>

        <input
          type="date"
          id="todo-due-date"
          class="todo-form__date"
        />
      </div>

      <button type="submit" class="todo-form__button">Add Task</button>
    </form>

    <div class="toolbar">
      <div class="filters" id="filters">
        <button class="filters__btn is-active" data-filter="all">All</button>
        <button class="filters__btn" data-filter="active">Active</button>
        <button class="filters__btn" data-filter="completed">Completed</button>
        <button class="filters__btn" data-filter="overdue">Overdue</button>
      </div>

      <select id="category-filter" class="category-filter">
        <option value="all">All Categories</option>
        <option value="general">General</option>
        <option value="work">Work</option>
        <option value="study">Study</option>
        <option value="personal">Personal</option>
      </select>

      <select id="sort-select" class="sort-select">
        <option value="created">Sort: Newest</option>
        <option value="priority">Sort: Priority</option>
        <option value="dueDate">Sort: Due Date</option>
      </select>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <footer class="app__footer">
      <span id="items-left">0 items left</span>
      <button id="clear-completed" class="clear-btn">Clear completed</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
