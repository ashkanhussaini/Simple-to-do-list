<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app__header">
      <h1>To-Do List</h1>
      <p class="app__subtitle">Stay organized, one task at a time.</p>
    </header>

    <form id="todo-form" class="todo-form">
      <input
        type="text"
        id="todo-input"
        class="todo-form__input"
        placeholder="Add a new task..."
        autocomplete="off"
        required
      />
      <button type="submit" class="todo-form__button">Add</button>
    </form>

    <div class="filters" id="filters">
      <button class="filters__btn is-active" data-filter="all">All</button>
      <button class="filters__btn" data-filter="active">Active</button>
      <button class="filters__btn" data-filter="completed">Completed</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <footer class="app__footer">
      <span id="items-left">0 items left</span>
      <button id="clear-completed" class="clear-btn">Clear completed</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
